<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Django App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        /* Navbar */
        .navbar {
            background: #0d6efd;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* Container */
        .container {
            padding: 20px;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <h2>🚀 My App</h2>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/ai/">AI</a>
            <a href="/login/">Login</a>
        </div>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- 🔥 FOOTER -->
    <div class="footer">
        © 2026 My Django App | Made by Himanshu 💪
    </div>

</body>
</html>
